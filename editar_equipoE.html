<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Editar Equipo</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<style>
body{
    background:#f4f6f9;
    font-family:'Segoe UI', sans-serif;
}

.sidebar{
    width:260px;
    min-width:260px;
    flex-shrink:0;
    background:#0f172a;
    min-height:100vh;
    color:#fff;
}

.sidebar a{
    display:flex;
    align-items:center;
    gap:10px;
    padding:12px 18px;
    color:#cbd5e1;
    text-decoration:none;
    transition:.2s;
}

.sidebar a:hover{
    background:#1e293b;
    color:#fff;
}


.sidebar a:hover{
    background:#1e293b;
    color:#fff;
}

.header{
    background:#fff;
    padding:12px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.user-box{
    display:flex;
    align-items:center;
    gap:10px;
}

.user-box img{
    width:42px;
    height:42px;
    border-radius:50%;
    object-fit:cover;
}

.card-ui{
    background:#fff;
    border-radius:14px;
    padding:20px;
    box-shadow:0 2px 8px rgba(0,0,0,0.06);
}

@media(max-width:768px){
    .sidebar{
        width:100px;
        font-size:12px;
    }

    .sidebar a{
        flex-direction:column;
        font-size:11px;
        text-align:center;
    }
}
</style>
</head>

<body onload="init()">

<div class="d-flex">
<div class="sidebar">

    <div class="p-3 text-center border-bottom">
        <img src="iconogris.png" width="65">
        <h6>Sistema Préstamos</h6>
        <small>Encargado</small>
    </div>

    <a href="dashboard-encargado.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
    <a href="equipos-encargado.html"><i class="bi bi-hdd-stack"></i> Equipos</a>
    <a href="registrar_prestamoE.html"><i class="bi bi-box-arrow-in-down"></i> Préstamo</a>
    <a href="registrar_devolucionE.html"><i class="bi bi-arrow-return-left"></i> Devolución</a>
    <a href="historial_PrestamosE.html"><i class="bi bi-clock-history"></i> Historial</a>
    <a href="perfilE.html"><i class="bi bi-person-circle"></i> Perfil</a>

</div>


<div class="flex-grow-1">

<div class="header">

    <div>
        <h6 class="mb-0">Facultad de Ingeniería Mochis</h6>
        <small>Universidad Autónoma de Sinaloa</small>
    </div>

    <div class="user-box">
        <span id="nombreUser">Encargado</span>
        <img id="fotoUser" src="iconogris.png">
        <button class="btn btn-danger btn-sm" onclick="logout()">
            <i class="bi bi-box-arrow-right"></i>
        </button>
    </div>

</div>

<div class="p-4">

<h4 class="text-primary fw-bold mb-3">Editar Equipo</h4>

<a href="equipos-encargado.html" class="btn btn-outline-secondary mb-3">
<i class="bi bi-arrow-left"></i> Regresar
</a>

<div id="msg"></div>

<div class="card-ui">

<form onsubmit="return guardar()">

<div class="row g-3">

<div class="col-md-6">
<label>Nombre</label>
<input id="nombre" class="form-control" required>
</div>

<div class="col-md-6">
<label>Categoría</label>
<select id="categoria" class="form-select"></select>
</div>

<div class="col-md-6">
<label>No. Serie</label>
<input id="serie" class="form-control">
</div>

<div class="col-md-6">
<label>RFID</label>
<input id="rfid" class="form-control">
</div>

<div class="col-md-6">
<label>Tipo uso</label>
<select id="tipoUso" class="form-select"></select>
</div>

<div class="col-md-6">
<label>Estado</label>
<select id="estado" class="form-select">
<option>Disponible</option>
<option>Prestado</option>
<option>Mantenimiento</option>
</select>
</div>

<div class="col-12">
<label>Descripción</label>
<textarea id="descripcion" class="form-control"></textarea>
</div>

</div>

<div class="mt-3 text-end">
<button class="btn btn-primary">
<i class="bi bi-save"></i> Guardar cambios
</button>
</div>

</form>

</div>

</div>
</div>
</div>

<script>

const API="http://localhost:5193";
let id=new URLSearchParams(location.search).get("id");

function logout(){
localStorage.removeItem("usuario");
location.href="login.html";
}

function cargarUsuario(){
let u=JSON.parse(localStorage.getItem("usuario"));
if(u){
document.getElementById("nombreUser").innerText=u.nombre;
if(u.foto){
document.getElementById("fotoUser").src="data:image/png;base64,"+u.foto;
}
}
}

async function init(){
cargarUsuario();
await cargar();
await cargarCategorias();
await cargarTipos();
setInterval(cargar,10000);
}

async function cargar(){

let r=await fetch(`${API}/api/equipos/${id}`);
let d=await r.json();

nombre.value=d.nombre||"";
categoria.value=d.categoria||"";
serie.value=d.numeroSerie||"";
rfid.value=d.rfid||"";
tipoUso.value=d.tipoUso||"";
estado.value=d.estado||"";
descripcion.value=d.descripcion||"";
}

async function cargarCategorias(){
let r=await fetch(`${API}/api/equipos/categorias`);
let d=await r.json();
categoria.innerHTML=d.map(x=>`<option>${x}</option>`).join("");
}

async function cargarTipos(){
let r=await fetch(`${API}/api/tiposuso`);
let d=await r.json();
tipoUso.innerHTML=d.map(x=>`<option>${x.nombre}</option>`).join("");
}

async function guardar(){

if(!nombre.value){
msg.innerHTML=`<div class="alert alert-danger">Nombre obligatorio</div>`;
return false;
}

let data={
nombre:nombre.value,
categoria:categoria.value,
numeroSerie:serie.value,
rfid:rfid.value,
tipoUso:tipoUso.value,
estado:estado.value,
descripcion:descripcion.value
};

let r=await fetch(`${API}/api/equipos/${id}`,{
method:"PUT",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
});

let d=await r.json();

msg.innerHTML=`<div class="alert alert-success">${d.mensaje}</div>`;

setTimeout(()=>location.href="equipos-encargado.html",1200);

return false;
}

</script>

</body>
</html>
