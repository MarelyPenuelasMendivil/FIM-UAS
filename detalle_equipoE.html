<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Detalle del Equipo</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<style>
body{
    background:#f4f6f9;
    font-family:'Segoe UI', sans-serif;
}

.sidebar{
    width:260px;
    background:#0f172a;
    min-height:100vh;
    color:#fff;
}

.sidebar a{
    display:flex;
    align-items:center;
    gap:10px;
    padding:12px 18px;
    color:#cbd5e1;
    text-decoration:none;
}

.sidebar a:hover{
    background:#1e293b;
    color:#fff;
}

.header{
    background:#fff;
    padding:12px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.card-ui{
    border-radius:14px;
}

.timeline{
    border-left:3px solid #0d6efd;
    padding-left:20px;
}

.timeline-item{
    margin-bottom:15px;
    position:relative;
}

.timeline-item::before{
    content:"";
    position:absolute;
    left:-11px;
    top:5px;
    width:12px;
    height:12px;
    background:#0d6efd;
    border-radius:50%;
}

@media(max-width:768px){
    .sidebar{ width:90px; }
    .sidebar a{
        flex-direction:column;
        font-size:11px;
        text-align:center;
    }
}
</style>

</head>

<body onload="cargarDetalle()">

<div class="d-flex">

<div class="sidebar">

    <div class="p-3 text-center border-bottom">
        <img src="iconogris.png" width="65">
        <h6>Sistema Préstamos</h6>
        <small>Encargado</small>
    </div>

    <a href="dashboard-encargado.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
    <a href="equipos-encargado.html"><i class="bi bi-hdd-stack"></i> Equipos</a>
    <a href="registrar_prestamoE.html"><i class="bi bi-box-arrow-in-down"></i> Préstamo</a>
    <a href="registrar_devolucionE.html"><i class="bi bi-arrow-return-left"></i> Devolución</a>
    <a href="historial_PrestamosE.html"><i class="bi bi-clock-history"></i> Historial</a>
    <a href="perfilE.html"><i class="bi bi-person-circle"></i> Perfil</a>

</div>

<div class="flex-grow-1">

<div class="header">
    <div>
        <h6 class="mb-0">Facultad de Ingeniería Mochis</h6>
        <small>Universidad Autónoma de Sinaloa</small>
    </div>

    <button class="btn btn-danger btn-sm" onclick="logout()">
        <i class="bi bi-box-arrow-right"></i>
    </button>
</div>

<div class="p-4">

<div class="d-flex align-items-center gap-2 mb-3">
    <i class="bi bi-laptop fs-3 text-primary"></i>
    <h3 class="text-primary fw-bold mb-0">Detalle del Equipo</h3>
</div>

<a href="equipos-encargado.html" class="btn btn-outline-secondary mb-3">
    <i class="bi bi-arrow-left"></i> Regresar
</a>

<div class="card card-ui shadow p-4">

<div class="mb-3">
    <h4 id="nombreEquipo" class="fw-bold text-primary"></h4>
    <span id="estadoEquipo" class="badge"></span>
</div>

<div class="row">
    <div class="col-md-4 mb-2"><strong>Categoría:</strong><div id="categoria"></div></div>
    <div class="col-md-4 mb-2"><strong>No. Serie:</strong><div id="serie"></div></div>
    <div class="col-md-4 mb-2"><strong>RFID:</strong><div id="rfid"></div></div>
    <div class="col-md-4 mb-2"><strong>Ubicación:</strong><div id="ubicacion"></div></div>
    <div class="col-md-4 mb-2"><strong>Tipo uso:</strong><div id="tipoUso"></div></div>
    <div class="col-md-4 mb-2"><strong>Laboratorio:</strong><div id="lab"></div></div>
</div>

<div class="mb-3">
    <strong>Descripción</strong>
    <p id="descripcion"></p>
</div>

<hr>

<h5 class="fw-bold mb-3">
    <i class="bi bi-clock-history"></i> Historial del equipo
</h5>

<div id="historial" class="timeline"></div>

</div>
</div>
</div>
</div>

<script>

const API = "http://localhost:5193";

function logout(){
    localStorage.removeItem("usuario");
    window.location.href = "login.html";
}

function formatearFecha(fecha){
    if(!fecha) return "Sin fecha";

    const d = new Date(fecha);

    if(isNaN(d.getTime())){
        return "Sin fecha válida";
    }

    return d.toLocaleString();
}

async function cargarDetalle(){

    const id = new URLSearchParams(window.location.search).get("id");

    try {

        let res = await fetch(`${API}/api/equipos/${id}`);
        let e = await res.json();

        nombreEquipo.innerText = e.nombre || "";
        categoria.innerText = e.categoria || "";
        serie.innerText = e.numeroSerie || "";
        rfid.innerText = e.rfid || "";
        ubicacion.innerText = e.laboratorio || "";
        lab.innerText = e.laboratorio || "";
        tipoUso.innerText = e.tipoUso || "";
        descripcion.innerText = e.descripcion || "";

        estadoEquipo.innerText = e.estado || "";

        estadoEquipo.className = "badge";
        if(e.estado === "Disponible") estadoEquipo.classList.add("bg-success");
        if(e.estado === "Prestado") estadoEquipo.classList.add("bg-danger");
        if(e.estado === "Mantenimiento") estadoEquipo.classList.add("bg-warning","text-dark");

        let hres = await fetch(`${API}/api/equipos/${id}/historial`);
        let historial = await hres.json();

        let cont = document.getElementById("historial");
        cont.innerHTML = "";

        if(!historial || historial.length === 0){
            cont.innerHTML = `<div class="text-muted">Sin historial</div>`;
            return;
        }

        historial.forEach(h => {
let color = "primary";

if(h.tipo === "PRESTAMO") color = "primary";
if(h.tipo === "DEVOLUCION") color = "primary";

            let estado = h.estado || "Activo";

            cont.innerHTML += `
            <div class="timeline-item">
                
                <span class="badge bg-${color}">
                    ${h.tipo}
                </span>

                <div>
                    <strong>${h.usuario || "Sistema"}</strong>
                </div>

                <small class="text-muted">
                    ${formatearFecha(h.fechaPrestamo || h.fecha)}
                </small>

                <div>
                    ${h.fechaDevolucion 
                        ? "🔁 Devuelto: " + formatearFecha(h.fechaDevolucion)
                        : "🟡 Aún activo"}
                </div>

                <div>
                    <span class="badge bg-dark">${estado}</span>
                </div>

            </div>`;
        });

    } catch (err){
        console.error(err);
        alert("Error cargando detalle del equipo");
    }
}

</script>

</body>
</html>
