<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sistema de Préstamos FIM</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background:#f4f6f9;
}

.login-card{
max-width:420px;
margin:auto;
}

.logo{
width:100px;
}
</style>

</head>

<body class="d-flex align-items-center vh-100">

<div class="container">

<div class="card shadow p-4 login-card">

<div class="text-center mb-3">
<img src="icono.png" class="logo">
</div>

<h5 class="text-center text-primary mb-4">
Sistema de Préstamo de Equipos
</h5>

<form onsubmit="login(event)">

<div class="mb-3">
<label for="cuenta" class="form-label">Número de cuenta</label>

<input 
id="cuenta"
type="text" 
class="form-control" 
placeholder="Ej. 1234567"
pattern="[0-9]*"
inputmode="numeric"
required
>

<div class="form-text">
Ingrese su número de cuenta institucional.
</div>

</div>

<div class="mb-3">

<label for="password" class="form-label">Contraseña</label>

<input 
id="password"
type="password" 
class="form-control" 
placeholder="Ingrese su contraseña"
required
>

</div>

<div class="mb-3 form-check">
<input type="checkbox" class="form-check-input">
<label class="form-check-label">Mantener sesión abierta</label>
</div>

<button type="submit" class="btn btn-primary w-100">
Iniciar sesión
</button>

<div class="text-center mt-3">
<a href="recuperar.html">¿Olvidaste tu contraseña?</a>
</div>

</form>

<hr>

<p class="text-center text-muted small">
Facultad de Ingeniería Mochis<br>
Universidad Autónoma de Sinaloa
</p>

</div>

</div>

<script>
function login(e){
    e.preventDefault();

    let cuenta = document.getElementById("cuenta").value;
    let password = document.getElementById("password").value;

    if(cuenta === "1234567" && password === "1234"){
        
        localStorage.setItem("logueado", "true");

        window.location.href = "dashboard.html";

    } else {
        alert("Número de cuenta o contraseña incorrectos");
    }
}
</script>

</body>
</html>
