<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Equipos - Encargado</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<style>
body{
    background:#f4f6f9;
    font-family:'Segoe UI', sans-serif;
}

.sidebar{
    width:260px;
    background:#0f172a;
    min-height:100vh;
    color:#fff;
}

.sidebar a{
    display:flex;
    align-items:center;
    gap:10px;
    padding:12px 18px;
    color:#cbd5e1;
    text-decoration:none;
    transition:.2s;
}

.sidebar a:hover{
    background:#1e293b;
    color:#fff;
}

.header{
    background:#fff;
    padding:12px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.user-box{
    display:flex;
    align-items:center;
    gap:10px;
}

.user-box img{
    width:42px;
    height:42px;
    border-radius:50%;
    object-fit:cover;
}

.card-ui{
    border-radius:14px;
    padding:15px;
}

.table thead{
    background:#0f172a;
    color:#fff;
}

.badge{
    font-size:12px;
}

@media(max-width:768px){
    .sidebar{
        width:90px;
    }

    .sidebar a{
        flex-direction:column;
        font-size:11px;
        text-align:center;
    }
}
</style>

</head>

<body>

<div class="d-flex">

<div class="sidebar">

    <div class="p-3 text-center border-bottom">
        <img src="iconogris.png" width="65">
        <h6>Sistema Préstamos</h6>
        <small>Encargado</small>
    </div>

    <a href="dashboard-encargado.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
    <a href="equipos-encargado.html"><i class="bi bi-hdd-stack"></i> Equipos</a>
    <a href="registrar_prestamoE.html"><i class="bi bi-box-arrow-in-down"></i> Préstamo</a>
    <a href="registrar_devolucionE.html"><i class="bi bi-arrow-return-left"></i> Devolución</a>
    <a href="historial_PrestamosE.html"><i class="bi bi-clock-history"></i> Historial</a>
    <a href="perfilE.html"><i class="bi bi-person-circle"></i> Perfil</a>

</div>

<div class="flex-grow-1">

<div class="header">

    <div>
        <h6 class="mb-0">Facultad de Ingeniería Mochis</h6>
        <small>Universidad Autónoma de Sinaloa</small>
    </div>

    <div class="user-box">
        <span id="nombreUser">Usuario</span>
        <img id="fotoUser" src="usuario.jpg">
        <button class="btn btn-danger btn-sm" onclick="logout()">
            <i class="bi bi-box-arrow-right"></i>
        </button>
    </div>

</div>

<div class="p-4">

<div class="d-flex justify-content-between align-items-center mb-3">
    <h3 class="text-primary fw-bold mb-0">
        <i class="bi bi-hdd-stack"></i> Equipos disponibles
    </h3>

    <input type="text" class="form-control w-50" placeholder="Buscar equipo..." onkeyup="filtrar()">
</div>

<div class="card card-ui shadow-sm">

<div class="table-responsive">

<table class="table table-hover align-middle mb-0">

<thead>
<tr>
<th>Nombre</th>
<th>Categoría</th>
<th>Serie</th>
<th>RFID</th>
<th>Estado</th>
<th>Acciones</th>
</tr>
</thead>

<tbody id="tabla"></tbody>

</table>

</div>

</div>

</div>
</div>
</div>

<script>

const API="http://localhost:5193";
const usuario=JSON.parse(localStorage.getItem("usuario"));

if(!usuario || !usuario.id){
    window.location.href="login.html";
}

function logout(){
    localStorage.removeItem("usuario");
    window.location.href="login.html";
}

function cargarUsuario(){
    document.getElementById("nombreUser").innerText=usuario.nombre;

    if(usuario.foto){
        document.getElementById("fotoUser").src="data:image/png;base64,"+usuario.foto;
    }
}

async function cargar(){
    let res=await fetch(API+"/api/equipos");
    let data=await res.json();

    let tabla=document.getElementById("tabla");
    tabla.innerHTML="";

    data.forEach(e=>{

        let color="secondary";
        if(e.estado==="Disponible") color="success";
        if(e.estado==="Prestado") color="danger";
        if(e.estado==="Mantenimiento") color="warning";

        tabla.innerHTML+=`
        <tr>
            <td>${e.nombre}</td>
            <td>${e.categoria||""}</td>
            <td>${e.numeroSerie||""}</td>
            <td>${e.rfid||""}</td>
            <td><span class="badge bg-${color}">${e.estado}</span></td>
            <td>
                <a href="detalle_equipoE.html?id=${e.idEquipo}" class="text-info me-2">
                    <i class="bi bi-eye"></i>
                </a>
                <a href="editar_equipoE.html?id=${e.idEquipo}" class="text-warning">
                    <i class="bi bi-pencil-square"></i>
                </a>
            </td>
        </tr>`;
    });
}

function filtrar(){
    let val=document.querySelector("input").value.toLowerCase();
    document.querySelectorAll("#tabla tr").forEach(r=>{
        r.style.display=r.innerText.toLowerCase().includes(val)?"":"none";
    });
}

setInterval(cargar,10000);

cargarUsuario();
cargar();

</script>

</body>
</html>
