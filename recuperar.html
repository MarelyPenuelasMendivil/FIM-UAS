<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Recuperar contraseña</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background:#f4f6f9;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.card-recuperar{
width:400px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.logo{
width:70px;
margin-bottom:10px;
}
</style>

</head>

<body>

<div class="card card-recuperar p-4">

<div class="text-center">
<img src="icono.png" class="logo">
<h4 class="mb-3">Recuperar contraseña</h4>
<p class="text-muted">
Ingresa tu correo institucional para recibir instrucciones
</p>
</div>

<form onsubmit="recuperar(event)">

<div class="mb-3">
<label class="form-label">Correo electrónico</label>
<input 
id="correo"
type="email" 
class="form-control" 
placeholder="ejemplo@uas.edu.mx"
required>
</div>

<div class="d-grid">
<button id="btn" type="submit" class="btn btn-primary">
Recuperar contraseña
</button>
</div>

</form>

<div class="alert alert-success mt-3 text-center" style="display:none" id="mensajeOk"></div>

<div class="alert alert-danger mt-3 text-center" style="display:none" id="mensajeError"></div>

<div class="text-center mt-3">
<a href="index.html" class="text-decoration-none">
Volver al inicio de sesión
</a>
</div>

</div>

<script>

async function recuperar(e){
    e.preventDefault();

    const correo = document.getElementById("correo").value;
    const btn = document.getElementById("btn");

    btn.disabled = true;
    btn.innerText = "Enviando...";

    try{
        const res = await fetch("http://localhost:5193/api/recuperar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ correo })
        });

        const data = await res.json();

        btn.disabled = false;
        btn.innerText = "Recuperar contraseña";

        if(data.success){

            document.getElementById("mensajeError").style.display = "none";

            const ok = document.getElementById("mensajeOk");
            ok.style.display = "block";

            if(data.link){
                ok.innerHTML = `
                    ✔ Se envió el enlace de recuperación:<br><br>
                    <a href="${data.link}" target="_blank">
                        🔐 Abrir recuperación de contraseña
                    </a>
                `;
            } else {
                ok.innerText = "✔ Revisa tu correo para recuperar tu contraseña";
            }

        } else {
            document.getElementById("mensajeOk").style.display = "none";

            const err = document.getElementById("mensajeError");
            err.style.display = "block";
            err.innerText = "❌ El correo no está registrado";
        }

    } catch(err){
        btn.disabled = false;
        btn.innerText = "Recuperar contraseña";

        document.getElementById("mensajeError").style.display = "block";
        document.getElementById("mensajeError").innerText = "Error conectando con la API";

        console.error(err);
    }
}

</script>

</body>
</html>
