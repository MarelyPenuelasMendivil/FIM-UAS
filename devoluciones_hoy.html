<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Devoluciones de Hoy</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<style>
body { background:#f4f6f9; }

.header-top{
    background:#fff;
    padding:10px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.sidebar{
    width:250px;
    background:#343a40;
    min-height:100vh;
    color:#fff;
}

.sidebar a{
    display:flex;
    align-items:center;
    gap:10px;
    padding:12px 20px;
    color:#fff;
    text-decoration:none;
}

.sidebar a:hover{
    background:#495057;
}

.main-content{
    padding:20px;
    width:100%;
}

.container-box{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<div class="d-flex">

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="p-3 text-center border-bottom">
        <img src="iconogris.png" style="width:70px;">
        <h6>Sistema de Préstamos</h6>
        <small>Encargado</small>
    </div>

    <a href="dashboard-encargado.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
    <a href="equipos-encargado.html"><i class="bi bi-hdd-stack"></i> Equipos disponibles</a>
    <a href="registrar_prestamoE.html"><i class="bi bi-box-arrow-in-down"></i> Registrar préstamo</a>
    <a href="registrar_devolucionE.html"><i class="bi bi-arrow-return-left"></i> Registrar devolución</a>
    <a href="historial_PrestamosE.html"><i class="bi bi-clock-history"></i> Historial</a>
    <a href="perfilE.html"><i class="bi bi-person-circle"></i> Perfil</a>
</div>

<!-- CONTENIDO -->
<div class="flex-grow-1">

<!-- HEADER -->
<div class="header-top">

    <div>
        <h6 class="mb-0">Facultad de Ingeniería Mochis</h6>
        <small>Universidad Autónoma de Sinaloa</small>
    </div>

    <button onclick="window.location.href='dashboard-encargado.html'" class="btn btn-outline-primary">
        <i class="bi bi-arrow-left"></i> Regresar
    </button>

</div>

<div class="main-content">

<div class="d-flex justify-content-between align-items-center mb-3">
    <h3 class="text-primary fw-bold mb-0">
        <i class="bi bi-arrow-return-left"></i> Devoluciones de Hoy
    </h3>
</div>

<div class="container-box">

<div class="table-responsive">
<table class="table table-hover align-middle">

<thead class="table-light">
<tr>
    <th>Usuario</th>
    <th>Equipo</th>
    <th>Fecha</th>
    <th>Observaciones</th>
</tr>
</thead>

<tbody id="tabla"></tbody>

</table>
</div>

</div>

</div>
</div>
</div>

<script>

const API = "http://localhost:5193";

async function cargarDevoluciones(){
    try{

        let res = await fetch(`${API}/api/devoluciones/hoy`);
        let data = await res.json();

        let tabla = document.getElementById("tabla");
        tabla.innerHTML = "";

        if(data.length === 0){
            tabla.innerHTML = `
            <tr>
                <td colspan="4" class="text-center text-muted">
                    No hay devoluciones hoy
                </td>
            </tr>`;
            return;
        }

        data.forEach(d => {

            tabla.innerHTML += `
            <tr>
                <td>${d.usuario}</td>
                <td>${d.equipo}</td>
                <td>${new Date(d.fecha).toLocaleString()}</td>
                <td>${d.observaciones}</td>
            </tr>`;
        });

    }catch(e){
        console.log(e);
        alert("Error cargando devoluciones");
    }
}

cargarDevoluciones();

</script>

</body>
</html>
