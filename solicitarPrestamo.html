<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solicitar Préstamo</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<style>
body{background:#f4f6f9;font-family:'Segoe UI',sans-serif;}

.sidebar{
width:260px;
background:#0f172a;
min-height:100vh;
color:#fff;
transition:.3s;
}

.sidebar a{
display:flex;
align-items:center;
gap:10px;
padding:12px 18px;
color:#cbd5e1;
text-decoration:none;
transition:.2s;
}

.sidebar a:hover,.active-link{
background:#1e293b;
color:#fff;
}

.header{
background:#fff;
padding:12px 20px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.user-box{
display:flex;
align-items:center;
gap:10px;
}

.user-box img{
width:42px;
height:42px;
border-radius:50%;
object-fit:cover;
}

.container-box{
background:#fff;
border-radius:14px;
padding:20px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

@media(max-width:768px){
.sidebar{
position:fixed;
left:-260px;
top:0;
z-index:1000;
}
.sidebar.active{
left:0;
}
}
</style>
</head>

<body onload="init()">

<div class="d-flex">

<div class="sidebar">

<div class="p-3 text-center border-bottom">
<img src="iconogris.png" width="65">
<h6>Sistema Préstamos</h6>
<small>Alumno</small>
</div>

<a href="dashboard-usuarioNormal.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
<a href="mis_prestamos.html"><i class="bi bi-box-arrow-in-down"></i> Mis préstamos</a>
<a href="solicitarPrestamo.html" class="active-link"><i class="bi bi-plus-circle"></i> Solicitar</a>
<a href="Historial_prestamos.html"><i class="bi bi-clock-history"></i> Historial</a>
<a href="perfil_configuracion.html"><i class="bi bi-person-circle"></i> Perfil</a>

</div>

<div class="flex-grow-1">

<div class="header">

<div class="d-flex align-items-center gap-2">
<button class="btn btn-dark d-md-none" onclick="toggleMenu()">
<i class="bi bi-list"></i>
</button>

<div>
<h6 class="mb-0">Facultad de Ingeniería Mochis</h6>
<small>Universidad Autónoma de Sinaloa</small>
</div>
</div>

<div class="user-box">
<div class="text-end">
<div class="fw-bold" id="nombreUsuario"></div>
<small id="numeroCuenta"></small>
</div>
<img id="fotoUsuario" src="">
<button class="btn btn-danger btn-sm" onclick="logout()">
<i class="bi bi-box-arrow-right"></i>
</button>
</div>

</div>

<div class="p-4">

<h5 class="mb-3 text-primary">
<i class="bi bi-plus-circle"></i> Solicitar Préstamo
</h5>

<div class="container-box mb-4">

<h6 class="mb-3">Equipos disponibles</h6>

<table class="table table-hover">
<thead class="table-light">
<tr>
<th>Equipo</th>
<th>Categoría</th>
<th>Estado</th>
<th></th>
</tr>
</thead>
<tbody id="tablaEquipos"></tbody>
</table>

</div>

<div class="container-box">

<h6 class="mb-3">Datos del préstamo</h6>

<div class="row">
<div class="col-md-6 mb-3">
<input id="equipo" class="form-control" placeholder="Equipo seleccionado" readonly>
</div>

<div class="col-md-6 mb-3">
<input type="datetime-local" id="fecha" class="form-control">
</div>

<div class="col-12 mb-3">
<textarea id="motivo" class="form-control" placeholder="Motivo"></textarea>
</div>
</div>

<button class="btn btn-success w-100" onclick="enviarSolicitud()">
Solicitar
</button>

</div>

</div>

</div>

</div>
<script>

const API="http://localhost:5193/api";
let usuario=JSON.parse(localStorage.getItem("usuario"));

function init(){
if(!usuario){
window.location.href="login.html";
return;
}
cargarPerfil();
cargarEquipos();
}

function toggleMenu(){
document.querySelector(".sidebar").classList.toggle("active");
}

function logout(){
localStorage.clear();
window.location.href="login.html";
}

async function cargarPerfil(){
let res=await fetch(`${API}/usuarios/${usuario.id}`);
let data=await res.json();

document.getElementById("nombreUsuario").innerText=data.nombre;
document.getElementById("numeroCuenta").innerText=data.numeroCuenta||"";

if(data.foto){
document.getElementById("fotoUsuario").src="data:image/png;base64,"+data.foto;
}
}

async function cargarEquipos(){
let res=await fetch(`${API}/equipos`);
let data=await res.json();

let tbody=document.getElementById("tablaEquipos");
tbody.innerHTML="";

data.forEach(e=>{
if(e.estado!=="Disponible") return;

tbody.innerHTML+=`
<tr>
<td>${e.nombre}</td>
<td>${e.categoria||""}</td>
<td><span class="badge bg-success">${e.estado}</span></td>
<td>
<button class="btn btn-primary btn-sm" onclick="seleccionar(${e.idEquipo},'${e.nombre}')">
Seleccionar
</button>
</td>
</tr>
`;
});
}

function seleccionar(id,nombre){
document.getElementById("equipo").value=nombre;
document.getElementById("equipo").setAttribute("data-id",id);
}

function validarFecha(fecha){
if(!fecha) return false;

let fechaObj = new Date(fecha);
if(isNaN(fechaObj.getTime())) return false;

let ahora = new Date();

if(fechaObj <= ahora){
alert("La fecha debe ser futura");
return false;
}

return true;
}

async function enviarSolicitud(){

let idEquipo=document.getElementById("equipo").getAttribute("data-id");
let fecha=document.getElementById("fecha").value;
let motivo=document.getElementById("motivo").value.trim();

if(!idEquipo){
alert("Selecciona un equipo");
return;
}

if(!validarFecha(fecha)){
alert("Fecha inválida");
return;
}

if(motivo.length < 5){
alert("Motivo muy corto (mínimo 5 caracteres)");
return;
}

❗ // 🔥 AQUI ESTA LA CLAVE
// NO usar toISOString
// usar el valor directo del input (ya viene en formato correcto)

let body = {
idUsuario: usuario.id,
idEquipo: parseInt(idEquipo),
fechaFin: fecha, // ✅ FORMATO CORRECTO
motivo: motivo
};

console.log("ENVIANDO:", body);

try{

let res=await fetch(`${API}/solicitudes`,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(body)
});

let data = await res.json().catch(()=>null);

console.log("RESPUESTA:", data);

if(res.ok){
alert("Solicitud enviada correctamente");
location.reload();
}else{
alert("Error del servidor: " + (data?.error || data?.message || "Revisa consola"));
}

}catch(e){
console.error(e);
alert("Error de conexión");
}
}

</script>

</body>
</html>
