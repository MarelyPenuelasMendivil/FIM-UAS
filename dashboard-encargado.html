<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard - Encargado</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<style>
body{
    background:#f4f6f9;
    font-family:'Segoe UI', sans-serif;
}

.sidebar{
    width:260px;
    background:#0f172a;
    min-height:100vh;
    color:#fff;
}

.sidebar a{
    display:flex;
    align-items:center;
    gap:10px;
    padding:12px 18px;
    color:#cbd5e1;
    text-decoration:none;
    transition:.2s;
}

.sidebar a:hover{
    background:#1e293b;
    color:#fff;
}

.sidebar h6{
    margin-top:10px;
}

.header{
    background:#fff;
    padding:12px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.card-ui{
    border-radius:14px;
    padding:20px;
    text-align:center;
    transition:.2s;
    cursor:pointer;
}

.card-ui:hover{
    transform:translateY(-5px);
}

.alert-box{
    border-radius:10px;
}

.user-box{
    display:flex;
    align-items:center;
    gap:10px;
}

.user-box img{
    width:42px;
    height:42px;
    border-radius:50%;
    object-fit:cover;
}
@media(max-width:768px){
    .sidebar{
        width:100px;
        font-size:12px;
    }

    .sidebar a{
        flex-direction:column;
        font-size:11px;
        text-align:center;
    }
}
</style>

</head>

<body>

<div class="d-flex">

<div class="sidebar">

    <div class="p-3 text-center border-bottom">
        <img src="iconogris.png" width="65">
        <h6>Sistema Préstamos</h6>
        <small>Encargado</small>
    </div>

    <a href="dashboard-encargado.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
    <a href="equipos-encargado.html"><i class="bi bi-hdd-stack"></i> Equipos</a>
    <a href="registrar_prestamoE.html"><i class="bi bi-box-arrow-in-down"></i> Préstamo</a>
    <a href="registrar_devolucionE.html"><i class="bi bi-arrow-return-left"></i> Devolución</a>
    <a href="historial_PrestamosE.html"><i class="bi bi-clock-history"></i> Historial</a>
    <a href="perfilE.html"><i class="bi bi-person-circle"></i> Perfil</a>

</div>

<div class="flex-grow-1">

<div class="header">

    <div>
        <h6 class="mb-0">Facultad de Ingeniería Mochis</h6>
        <small>Universidad Autónoma de Sinaloa</small>
    </div>

    <div class="user-box">
        <span id="nombreUser">Usuario</span>
        <img id="fotoUser" src="usuario.jpg">
        <button class="btn btn-danger btn-sm" onclick="logout()">
            <i class="bi bi-box-arrow-right"></i>
        </button>
    </div>

</div>

<div class="p-4">

<h3 class="text-primary fw-bold mb-4">Panel de Control</h3>

<div class="row g-3 mb-4">

    <div class="col-md-3">
        <a href="equipos-encargado.html" class="text-decoration-none text-dark">
            <div class="card card-ui shadow">
                <i class="bi bi-hdd-stack text-primary fs-3"></i>
                <h4 id="disp">0</h4>
                <small>Disponibles</small>
            </div>
        </a>
    </div>

    <div class="col-md-3">
        <a href="prestamos_activosE.html" class="text-decoration-none text-dark">
            <div class="card card-ui shadow">
                <i class="bi bi-box-arrow-in-down text-success fs-3"></i>
                <h4 id="activos">0</h4>
                <small>Activos</small>
            </div>
        </a>
    </div>

    <div class="col-md-3">
        <a href="prestamos_por_vencerE.html" class="text-decoration-none text-dark">
            <div class="card card-ui shadow">
                <i class="bi bi-clock-fill text-warning fs-3"></i>
                <h4 id="pendientes">0</h4>
                <small>Por vencer</small>
            </div>
        </a>
    </div>

    <div class="col-md-3">
        <a href="devoluciones_hoyE.html" class="text-decoration-none text-dark">
            <div class="card card-ui shadow">
                <i class="bi bi-arrow-return-left text-danger fs-3"></i>
                <h4 id="hoy">0</h4>
                <small>Devoluciones hoy</small>
            </div>
        </a>
    </div>

</div>

<h5>Alertas</h5>
<div id="alertas" class="mb-4"></div>

</div>
</div>
</div>

<!-- JS -->
<script>

const API = "http://localhost:5193";
const usuario = JSON.parse(localStorage.getItem("usuario"));

if(!usuario || !usuario.id){
    alert("No hay sesión iniciada");
    window.location.href = "login.html";
}

function logout(){
    localStorage.removeItem("usuario");
    window.location.href = "login.html";
}

function cargarUsuario(){
    document.getElementById("nombreUser").innerText = usuario.nombre;

    if(usuario.foto){
        document.getElementById("fotoUser").src =
        "data:image/png;base64," + usuario.foto;
    }
}

async function cargarDashboard(){
    try{
        let res = await fetch(`${API}/api/dashboard/encargado`);
        let data = await res.json();

        document.getElementById("disp").innerText = data.disponibles || 0;
        document.getElementById("activos").innerText = data.activos || 0;
        document.getElementById("pendientes").innerText = data.pendientes || 0;
        document.getElementById("hoy").innerText = data.hoy || 0;
    }catch(err){
        console.error(err);
    }
}

async function cargarAlertas(){
    try{
        let res = await fetch(`${API}/api/prestamos/alertas`);
        let data = await res.json();

        let cont = document.getElementById("alertas");
        cont.innerHTML = "";

        if(!data.length){
            cont.innerHTML = `<div class="alert alert-success">No hay alertas</div>`;
            return;
        }

        data.forEach(a=>{

            let color = "success";
            if(a.alerta.includes("CRÍTICO")) color="danger";
            else if(a.alerta.includes("URGENTE")) color="warning";
            else if(a.alerta.includes("HOY")) color="info";

            cont.innerHTML += `
            <div class="alert alert-${color} alert-box">
                <strong>${a.alerta}</strong> - ${a.equipo}
            </div>`;
        });

    }catch(err){
        console.error(err);
    }
}

cargarUsuario();
cargarDashboard();
cargarAlertas();

</script>

</body>
</html>
