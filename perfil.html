<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfil de Usuario</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<style>
body { background: #f4f6f9; }

.header-top {
    background: #fff;
    padding: 10px 20px;
    display: flex;
    justify-content: space-between;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.sidebar {
    background: #343a40;
    min-height: 100vh;
    color: #fff;
}

.sidebar a {
    display: flex;
    padding: 12px 20px;
    color: #fff;
    text-decoration: none;
}

.sidebar a:hover { background: #495057; }

.main-content { padding: 20px; }

.container-box {
    background: white;
    border-radius: 12px;
    padding: 25px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.user-img {
    width: 100px;
    border-radius: 50%;
}
</style>
</head>

<body>

<div class="d-flex">

    <div class="sidebar">
        <div class="p-3 text-center border-bottom">
            <h6>Usuario</h6>
        </div>

        <a href="notificaciones.html"><i class="bi bi-bell"></i> Notificaciones</a>
        <a href="#"><i class="bi bi-person"></i> Perfil</a>
    </div>

    <div class="flex-grow-1">

        <div class="header-top">
            <h6>Perfil de Usuario</h6>
            <img src="https://i.pravatar.cc/100" style="width:40px;border-radius:50%;">
        </div>

        <div class="main-content">

            <div class="container-box mb-4 text-center">
                <img src="https://i.pravatar.cc/150" class="user-img mb-3">
                <h5>Juan Pérez</h5>
                <p>Ingeniería de Software</p>
            </div>

            <div class="container-box mb-4">
                <h5><i class="bi bi-clock-history"></i> Historial de préstamos</h5>

                <ul class="list-group">
                    <li class="list-group-item">Laptop HP - Devuelto</li>
                    <li class="list-group-item">Multímetro - Devuelto</li>
                    <li class="list-group-item">Osciloscopio - Activo</li>
                </ul>
            </div>
            <div class="container-box">
                <h5><i class="bi bi-exclamation-triangle"></i> Advertencias</h5>

                <ul class="list-group">
                    <li class="list-group-item text-warning">
                        Retraso en devolución
                    </li>
                    <li class="list-group-item text-warning">
                        Uso indebido del equipo
                    </li>
                </ul>
            </div>

        </div>

    </div>

</div>

</body>
</html>
