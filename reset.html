<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Reset contraseña</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

<h3>Crear nueva contraseña</h3>

<form onsubmit="reset(event)">

<input type="password" id="pass" class="form-control mb-2" placeholder="Nueva contraseña" required>

<button class="btn btn-primary w-100">Actualizar</button>

</form>

<script>
const token = new URLSearchParams(window.location.search).get("token");

async function reset(e){
    e.preventDefault();

    const password = document.getElementById("pass").value;

    const res = await fetch("http://localhost:5193/api/reset-password", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ token, password })
    });

    const data = await res.json();

    if(data.success){
        alert("Contraseña actualizada");
        window.location.href = "index.html";
    } else {
        alert("Token inválido o expirado");
    }
}
</script>

</body>
</html>
