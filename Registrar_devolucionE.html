<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registrar Devolución</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<style>
body{
    background:#f4f6f9;
    font-family:'Segoe UI', sans-serif;
}

.sidebar{
    width:260px;
    background:#0f172a;
    min-height:100vh;
    color:#fff;
}

.sidebar a{
    display:flex;
    align-items:center;
    gap:10px;
    padding:12px 18px;
    color:#cbd5e1;
    text-decoration:none;
    transition:.2s;
}

.sidebar a:hover{
    background:#1e293b;
    color:#fff;
}

.header{
    background:#fff;
    padding:12px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.user-box{
    display:flex;
    align-items:center;
    gap:10px;
}

.user-box img{
    width:42px;
    height:42px;
    border-radius:50%;
    object-fit:cover;
}

.container-box{
    background:#fff;
    padding:25px;
    border-radius:12px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

#rfidStatus{
    padding:15px;
    border:2px dashed #0d6efd;
    text-align:center;
    border-radius:8px;
    background:#e9f2ff;
    margin-bottom:15px;
    font-weight:bold;
}
</style>
</head>

<body onload="init()">

<div class="d-flex">

<div class="sidebar">

    <div class="p-3 text-center border-bottom">
        <img src="iconogris.png" width="65">
        <h6>Sistema Préstamos</h6>
        <small>Encargado</small>
    </div>

    <a href="dashboard-encargado.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
    <a href="equipos-encargado.html"><i class="bi bi-hdd-stack"></i> Equipos</a>
    <a href="registrar_prestamoE.html"><i class="bi bi-box-arrow-in-down"></i> Préstamo</a>
    <a href="registrar_devolucionE.html"><i class="bi bi-arrow-return-left"></i> Devolución</a>
    <a href="historial_PrestamosE.html"><i class="bi bi-clock-history"></i> Historial</a>
    <a href="perfilE.html"><i class="bi bi-person-circle"></i> Perfil</a>

</div>

<div class="flex-grow-1">

<div class="header">

    <div>
        <h6 class="mb-0">Facultad de Ingeniería Mochis</h6>
        <small>Universidad Autónoma de Sinaloa</small>
    </div>

    <div class="user-box">
        <span id="nombreUser">Usuario</span>

        <img id="fotoUser" src="usuario.jpg">

        <button class="btn btn-danger btn-sm" onclick="logout()">
            <i class="bi bi-box-arrow-right"></i>
        </button>
    </div>

</div>

<div class="p-4">

<div class="container-box">

<h4 class="text-primary mb-3">
<i class="bi bi-arrow-return-left"></i> Registrar devolución
</h4>

<div id="rfidStatus">Esperando escaneo...</div>

<button class="btn btn-primary mb-3" onclick="escaneoRFID()">
<i class="bi bi-upc-scan"></i> Escanear RFID
</button>

<input type="text" id="busqueda" class="form-control mb-3" placeholder="Buscar...">

<table class="table table-hover">
<thead>
<tr>
<th>Usuario</th>
<th>Equipo</th>
<th>Estado</th>
<th>Préstamo</th>
<th>Devolución</th>
<th></th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

</div>

</div>

</div>
</div>

<div class="modal fade" id="manualModal">
<div class="modal-dialog">
<div class="modal-content">

<div class="modal-header">
<h5>Devolución manual</h5>
<button class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">
<input id="inputSerie" class="form-control" placeholder="Serie o RFID">
</div>

<div class="modal-footer">
<button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
<button class="btn btn-success" onclick="registrarManual()">Registrar</button>
</div>

</div>
</div>
</div>

<script>

const API="http://localhost:5193/api/prestamos";
let data=[];

function init(){
    cargarUsuario();
    cargar();
}

function cargarUsuario(){

    const u = JSON.parse(localStorage.getItem("usuario"));

    if(!u){
        location.href="login.html";
        return;
    }

    document.getElementById("nombreUser").innerText = u.nombre;

    if(u.foto && u.foto !== ""){
        document.getElementById("fotoUser").src = "data:image/png;base64," + u.foto;
    }else{
        document.getElementById("fotoUser").src = "usuario.jpg";
    }
}

async function cargar(){
    try{
        let res=await fetch(API);
        let all=await res.json();

        data=all.filter(x=>x.estado==="Activo");
        render();
    }catch(e){
        alert("Error cargando datos");
    }
}

function render(){

    let filtro=document.getElementById("busqueda").value.toLowerCase();

    let tbody=document.getElementById("tbody");
    tbody.innerHTML="";

    data.filter(p=>
        (p.usuario || "").toLowerCase().includes(filtro) ||
        (p.equipo || "").toLowerCase().includes(filtro)
    ).forEach(p=>{

        tbody.innerHTML+=`
        <tr>
            <td>${p.usuario}</td>
            <td>${p.equipo}</td>
            <td><span class="badge bg-success">Activo</span></td>
            <td>${p.fechaPrestamo || ""}</td>
            <td>${p.fechaDevolucion || ""}</td>
            <td>
                <button class="btn btn-success btn-sm" onclick="abrirModal()">
                    Registrar
                </button>
            </td>
        </tr>`;
    });
}

function abrirModal(){
    new bootstrap.Modal(document.getElementById("manualModal")).show();
}

async function registrarManual(){

    let serie=document.getElementById("inputSerie").value;

    if(!serie){
        alert("Ingresa serie o RFID");
        return;
    }

    try{
        let res=await fetch("http://localhost:5193/api/devoluciones/manual",{
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body:JSON.stringify({ serie })
        });

        let data=await res.json();

        if(res.ok){
            alert("✅ Devolución registrada");
            document.getElementById("inputSerie").value="";
            bootstrap.Modal.getInstance(document.getElementById("manualModal")).hide();
            cargar();
        }else{
            alert(data.mensaje || "Error");
        }

    }catch(e){
        alert("Error de conexión");
    }
}

function escaneoRFID(){

    document.getElementById("rfidStatus").innerText="Escaneando...";

    setTimeout(()=>{
        document.getElementById("rfidStatus").innerText="Simulación completada";
        abrirModal();
    },1500);
}

function logout(){
    localStorage.clear();
    location.href="login.html";
}

document.getElementById("busqueda").addEventListener("input", render);

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
