<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Préstamos Activos</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<style>
body { background: #f4f6f9; }

.header-top {
    background: #fff;
    padding: 10px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.sidebar {
    background: #0f172a;
    min-height: 100vh;
    color: #fff;
    width: 260px;
}

.sidebar a {
    display: flex;
    padding: 12px 20px;
    color: #cbd5f5;
    text-decoration: none;
    gap: 10px;
}

.sidebar a:hover { 
    background: #1e293b; 
    color: #fff;
}

.main-content { padding: 20px; }

.container-box {
    background: white;
    border-radius: 12px;
    padding: 25px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.badge-status {
    font-size: 0.9rem;
}

.btn-ver {
    background: #e2e8f0;
    border: none;
    color: #334155;
}

.btn-ver:hover {
    background: #cbd5f5;
}

.logout-btn{
    border:none;
    background:#ef4444;
    color:#fff;
    padding:8px 14px;
    border-radius:10px;
}

.logout-btn:hover{
    background:#dc2626;
}
</style>
</head>

<body>

<div class="d-flex">

<div class="sidebar">
    <div class="p-3 text-center border-bottom">
        <img src="iconogris.png" style="width:70px;">
        <h6>Sistema de Préstamos</h6>
        <small id="rolSidebar"></small>
    </div>

    <a href="dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
    <a href="usuarioAdmin.html"><i class="bi bi-people-fill"></i> Usuarios</a>
    <a href="equipos.html"><i class="bi bi-hdd-stack"></i> Equipos</a>
    <a href="lista_solicitudes.html"><i class="bi bi-box-arrow-in-down"></i> Préstamos</a>
    <a href="reportes.html"><i class="bi bi-graph-up"></i> Reportes</a>
    <a href="advertencias.html"><i class="bi bi-exclamation-triangle"></i> Advertencias</a>
</div>

<div class="flex-grow-1">

<div class="header-top">
    <div>
        <h6>Facultad de Ingeniería Mochis</h6>
        <small>Universidad Autónoma de Sinaloa</small>
    </div>

    <div class="d-flex align-items-center gap-3">
      

        <img src="logo_fim.png" style="width:60px;">

        <button class="logout-btn" onclick="logout()">
            <i class="bi bi-box-arrow-right"></i>
        </button>
    </div>
</div>

<div class="main-content">

<div class="container-box">

<div class="d-flex justify-content-between mb-3 flex-wrap gap-2">
     <button class="btn btn-secondary" onclick="regresar()">
            <i class="bi bi-arrow-left"></i> Regresar
        </button>
    <input type="text" class="form-control w-25" placeholder="Buscar por nombre o número de cuenta..." onkeyup="filtrarTabla(this.value)">
    
    <select class="form-select w-25" onchange="filtrarEstado(this.value)">
        <option value="">Todos los estados</option>
        <option value="Activo">Activo</option>
        <option value="Devuelto">Devuelto</option>
    </select>
</div>

<div class="table-responsive">
<table class="table table-hover" id="tablaPrestamos">
<thead class="table-light">
<tr>
    <th>Usuario</th>
    <th>Equipo</th>
    <th>Fecha préstamo</th>
    <th>Fecha devolución</th>
    <th>Estado</th>
    <th>Acción</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

</div>

</div>

</div>
</div>

<script>
const API_URL = "http://localhost:5193/api/prestamos";
let prestamosGlobal = [];

document.getElementById("rolSidebar").innerText =
localStorage.getItem("rol") || "Administrador";

function regresar(){
    window.location.href = "http://127.0.0.1:5500/sistema-prestamos-FIM/lista_solicitudes.html";
}

function logout(){
    localStorage.clear();
    window.location.href = "index.html";
}

function cargarPrestamos() {
    fetch(API_URL + "?t=" + new Date().getTime())
        .then(res => res.json())
        .then(data => {
            prestamosGlobal = data;
            renderTabla(data);
        })
        .catch(err => console.error(err));
}

function renderTabla(data) {
    let tbody = document.querySelector("#tablaPrestamos tbody");
    tbody.innerHTML = "";

    data.forEach(p => {

        let estado = (p.estado || "").toLowerCase();
        let badgeClass = "bg-secondary";

        if (estado === "activo") badgeClass = "bg-success";
        else if (estado === "devuelto") badgeClass = "bg-primary";

        tbody.innerHTML += `
        <tr>
            <td>${p.usuario}</td>
            <td>${p.equipo}</td>
            <td>${formatearFecha(p.fechaPrestamo)}</td>
            <td>${p.fechaDevolucion ? formatearFecha(p.fechaDevolucion) : "Sin devolver"}</td>
            <td>
                <span class="badge ${badgeClass} badge-status text-white">
                    ${p.estado}
                </span>
            </td>
            <td>
                <button class="btn btn-sm btn-ver"
                    onclick="verDetalle(${p.id})">
                    Ver
                </button>
            </td>
        </tr>`;
    });
}

function formatearFecha(fecha){
    let f = new Date(fecha);
    return f.toLocaleString();
}

function filtrarTabla(valor){
    let texto = valor.toLowerCase();

    let filtrados = prestamosGlobal.filter(p => 
        (p.usuario && p.usuario.toLowerCase().includes(texto)) ||
        (p.usuarioId && p.usuarioId.toString().includes(texto))
    );

    renderTabla(filtrados);
}

function filtrarEstado(estado){
    if(!estado){
        renderTabla(prestamosGlobal);
        return;
    }

    let filtrados = prestamosGlobal.filter(p => p.estado === estado);
    renderTabla(filtrados);
}

function verDetalle(id){
    if (!id) {
        alert("Error: sin ID");
        return;
    }
    window.location.href = `detalle_prestamo.html?id=${id}`;
}

document.addEventListener("DOMContentLoaded", cargarPrestamos);
</script>

</body>
</html>
