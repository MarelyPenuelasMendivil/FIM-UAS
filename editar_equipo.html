<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editar Equipo - Sistema de Préstamos</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<style>
body { background: #f4f6f9; }

.header-top {
    background: #ffffff;
    padding: 10px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.sidebar {
    background: #343a40;
    min-height: 100vh;
    color: #fff;
}

.sidebar a {
    display: flex;
    align-items: center;
    padding: 12px 20px;
    color: #fff;
    text-decoration: none;
}

.sidebar a:hover { background: #495057; }

.sidebar i { margin-right: 10px; }

.main-content { padding: 20px; }

.container-box {
    background: white;
    border-radius: 12px;
    padding: 25px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.user-panel img {
    width: 40px;
    height: 40px;
    border-radius: 50%;
}
</style>
</head>

<body onload="cargarDatos(); toggleCarrera()">

<div class="d-flex">

     <div class="sidebar">
        <div class="p-3 text-center border-bottom">
            <img src="iconogris.png" style="width:70px;">
            <h6>Sistema de Préstamos</h6>
            <small>Administrador</small>
        </div>

       <a href="dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
        <a href="usuarioAdmin.html"><i class="bi bi-people-fill"></i> Usuarios</a>
        <a href="equipos.html"><i class="bi bi-hdd-stack"></i> Equipos</a>
        <a href="lista_solicitudes.html"><i class="bi bi-box-arrow-in-down"></i> Préstamos</a>
        <a href="reportes.html"><i class="bi bi-graph-up"></i> Reportes</a>
        <a href="advertencias.html"><i class="bi bi-exclamation-triangle"></i> Advertencias</a>
    </div>


    <div class="flex-grow-1">

        <div class="header-top">
            <div>
                <h6 class="mb-0">Facultad de Ingeniería Mochis</h6>
                <small>Universidad Autónoma de Sinaloa</small>
            </div>

            <div class="d-flex align-items-center gap-3">
                <img src="logo_fim.png" style="width:60px;">
             
            </div>
        </div>

        <div class="main-content">

            <a href="equipos.html" class="btn btn-secondary mb-3">
                <i class="bi bi-arrow-left"></i> Regresar
            </a>

            <h3 class="fw-bold text-warning mb-4">
                <i class="bi bi-pencil-square"></i> Editar Equipo
            </h3>

            <div class="container-box">

                <form onsubmit="return actualizarEquipo()">

                    <div class="row g-3">

                        <div class="col-md-6">
                            <label class="form-label">Nombre del equipo</label>
                            <input type="text" class="form-control" id="nombre" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Categoría / Tipo</label>
                            <select class="form-select" id="categoria" required>
                                <option>Cómputo</option>
                                <option>Geodesia</option>
                                <option>Civil</option>
                                <option>etc...</option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Número de serie</label>
                            <input type="text" class="form-control" id="serie" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Código RFID</label>
                            <div class="input-group">
                                <input type="text" class="form-control" id="rfid" required>
                                <button class="btn btn-outline-secondary" type="button" onclick="simularRFID()">
                                    <i class="bi bi-upc-scan"></i>
                                </button>
                            </div>
                        </div>

                        <div class="col-md-12">
                            <label class="form-label">Descripción</label>
                            <textarea class="form-control" id="descripcion" rows="3"></textarea>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Ubicación</label>
                            <select class="form-select" id="ubicacion">
                                <option>Lab Software</option>
                                <option>Lab Geodesia</option>
                                <option>Lab Civil</option>
                                <option>Lab Procesos Industriales</option>
                                <option>Lab Energías Renovables</option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Tipo de uso</label>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="compartido" onchange="toggleCarrera()">
                                <label class="form-check-label">
                                    Equipo compartido (toda la FIM)
                                </label>
                            </div>
                        </div>

                        <div class="col-md-6" id="contenedorCarrera">
                            <label class="form-label">Asignado a carrera</label>
                            <select class="form-select" id="carrera">
                                <option>Ingeniería Civil</option>
                                <option>Ingeniería Geodésica</option>
                                <option>Ingeniería de Software</option>
                                <option>Ingeniería en Procesos Industriales</option>
                                <option>Ingeniería en Nanotecnología y Energías Renovables</option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Estado</label>
                            <select class="form-select" id="estado">
                                <option>Disponible</option>
                                <option>Prestado</option>
                                <option>Mantenimiento</option>
                            </select>
                        </div>

                    </div>

                    <div class="mt-4 d-flex justify-content-end gap-2">
                        <a href="equipos.html" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-warning">
                            <i class="bi bi-save"></i> Actualizar Equipo
                        </button>
                    </div>

                </form>

            </div>

        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
function toggleCarrera() {
    let check = document.getElementById("compartido");
    let carrera = document.getElementById("contenedorCarrera");
    carrera.style.display = check.checked ? "none" : "block";
}

function cargarDatos() {
    document.getElementById("nombre").value = "Laptop HP";
    document.getElementById("categoria").value = "Cómputo";
    document.getElementById("serie").value = "HP-12345";
    document.getElementById("rfid").value = "RFID-001";
    document.getElementById("descripcion").value = "Equipo para prácticas de laboratorio";
    document.getElementById("ubicacion").value = "Lab Software";
    document.getElementById("estado").value = "Disponible";

    document.getElementById("compartido").checked = false;
    document.getElementById("carrera").value = "Ingeniería de Software";
}

function actualizarEquipo() {

    let nombre = document.getElementById("nombre").value;

    if(nombre.length < 3){
        alert("Nombre inválido");
        return false;
    }

    alert("✅ Equipo actualizado correctamente");
    window.location.href = "equipos.html";
    return false;
}

function simularRFID() {
    let codigo = "RFID-" + Math.floor(Math.random() * 1000);
    document.getElementById("rfid").value = codigo;
}
</script>

</body>
</html>
