<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Historial de Préstamos</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<style>
body{background:#f4f6f9;font-family:'Segoe UI',sans-serif;}

.sidebar{
width:260px;
background:#0f172a;
min-height:100vh;
color:#fff;
}

.sidebar a{
display:flex;
align-items:center;
gap:10px;
padding:12px 18px;
color:#cbd5e1;
text-decoration:none;
}

.sidebar a:hover,.active-link{
background:#1e293b;
color:#fff;
}

.header{
background:#fff;
padding:12px 20px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.user-box{
display:flex;
align-items:center;
gap:10px;
}

.user-box img{
width:42px;
height:42px;
border-radius:50%;
object-fit:cover;
}

.container-box{
background:#fff;
border-radius:14px;
padding:20px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.badge{
font-size:12px;
padding:6px 10px;
}
</style>
</head>

<body onload="init()">

<div class="d-flex">

<div class="sidebar">
<div class="p-3 text-center border-bottom">
<img src="iconogris.png" width="65">
<h6>Sistema Préstamos</h6>
<small>Alumno</small>
</div>

<a href="dashboard-usuarioNormal.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
<a href="mis_prestamos.html"><i class="bi bi-box-arrow-in-down"></i> Mis préstamos</a>
<a href="solicitarPrestamo.html"><i class="bi bi-plus-circle"></i> Solicitar</a>
<a href="Historial_prestamos.html" class="active-link"><i class="bi bi-clock-history"></i> Historial</a>
<a href="perfil_configuracion.html"><i class="bi bi-person-circle"></i> Perfil</a>
</div>

<div class="flex-grow-1">

<div class="header">
<div>
<h6 class="mb-0">Facultad de Ingeniería Mochis</h6>
<small>Universidad Autónoma de Sinaloa</small>
</div>

<div class="user-box">
<div class="text-end">
<div class="fw-bold" id="nombreUsuario"></div>
<small id="numeroCuenta"></small>
</div>
<img id="fotoUsuario" src="">
<button class="btn btn-danger btn-sm" onclick="logout()">
<i class="bi bi-box-arrow-right"></i>
</button>
</div>
</div>

<div class="p-4">

<h5 class="mb-3 text-primary">
<i class="bi bi-clock-history"></i> Historial de Préstamos
</h5>

<div id="alertaAdvertencias" class="alert alert-danger d-none">
<i class="bi bi-exclamation-triangle"></i>
<strong>Tienes advertencias registradas.</strong>
<span id="textoAdvertencias"></span>
</div>

<div class="container-box mb-3">
<div class="row g-3">

<div class="col-md-5">
<input type="text" id="buscar" class="form-control" placeholder="Buscar equipo..." oninput="filtrar()">
</div>

<div class="col-md-4">
<select id="estado" class="form-select" onchange="filtrar()">
<option value="">Todos</option>
<option value="Devuelto">Devuelto</option>
<option value="Activo">Activo</option>
<option value="Retraso">Retraso</option>
</select>
</div>

<div class="col-md-3">
<button class="btn btn-primary w-100" onclick="cargarHistorial()">
<i class="bi bi-arrow-repeat"></i> Recargar
</button>
</div>

</div>
</div>
<div class="container-box">

<table class="table table-hover align-middle">
<thead class="table-light">
<tr>
<th>Equipo</th>
<th>Inicio</th>
<th>Fin</th>
<th>Estado</th>
<th>Observación</th>
</tr>
</thead>

<tbody id="bodyTabla"></tbody>
</table>

<div id="sinResultados" class="text-center text-muted mt-3" style="display:none;">
No hay registros
</div>

</div>

</div>
</div>
</div>

<script>

const API="http://localhost:5193/api";
let usuario=null;
let historial=[];

function init(){
usuario=JSON.parse(localStorage.getItem("usuario"));

if(!usuario){
window.location.href="login.html";
return;
}

cargarPerfil();
cargarHistorial();
cargarAdvertencias();
}

async function cargarPerfil(){
let res=await fetch(`${API}/usuarios/${usuario.id}`);
let data=await res.json();

document.getElementById("nombreUsuario").innerText=data.nombre;
document.getElementById("numeroCuenta").innerText=data.numeroCuenta || "";

document.getElementById("fotoUsuario").src=
data.foto ? "data:image/png;base64,"+data.foto : "usuario.jpg";
}

async function cargarAdvertencias(){
try{
let res=await fetch(`${API}/advertencias/${usuario.id}`);
let data=await res.json();

if(data.length>0){
let box=document.getElementById("alertaAdvertencias");
box.classList.remove("d-none");

document.getElementById("textoAdvertencias").innerText=
` Tienes ${data.length} advertencia(s).`;

if(data.length>=3){
box.innerHTML+=` <br><strong>⚠️ Riesgo de sanción</strong>`;
}
}
}catch(e){
console.error(e);
}
}

function logout(){
localStorage.clear();
window.location.href="login.html";
}

function formatearFecha(f){
if(!f) return "-";
return new Date(f).toLocaleString();
}

function estadoReal(p){

if(p.estado==="Devuelto") return "Devuelto";

if(!p.fechaDevolucion) return "Activo";

let fin=new Date(p.fechaDevolucion);
let ahora=new Date();

if(fin < ahora) return "Retraso";

return "Activo";
}

function getColor(e){
if(e==="Devuelto") return "success";
if(e==="Activo") return "warning";
if(e==="Retraso") return "danger";
return "secondary";
}


async function cargarHistorial(){
try{
let res=await fetch(`${API}/historial/${usuario.id}`);
historial=await res.json();
renderTabla(historial);
}catch(e){
console.error(e);
alert("Error cargando historial");
}
}

function renderTabla(data){

let tbody=document.getElementById("bodyTabla");
tbody.innerHTML="";

if(data.length===0){
document.getElementById("sinResultados").style.display="block";
return;
}

document.getElementById("sinResultados").style.display="none";

data.forEach(p=>{

let estado=estadoReal(p);

tbody.innerHTML+=`
<tr>
<td>${p.equipo}</td>
<td>${formatearFecha(p.fechaPrestamo)}</td>
<td>${formatearFecha(p.fechaDevolucion)}</td>
<td><span class="badge bg-${getColor(estado)}">${estado}</span></td>
<td>${p.observacion || "Sin observaciones"}</td></tr>
`;
});
}

function filtrar(){

let texto=document.getElementById("buscar").value.toLowerCase();
let estado=document.getElementById("estado").value;

let filtrados=historial.filter(p=>{

let nombre=(p.equipo || "").toLowerCase();
let estadoCalc=estadoReal(p);

return nombre.includes(texto) && (!estado || estadoCalc===estado);
});

renderTabla(filtrados);
}

</script>

</body>
</html>
