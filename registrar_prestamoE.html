<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista de Solicitudes</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<style>
body{
    background:#f4f6f9;
    font-family:'Segoe UI', sans-serif;
}

.sidebar{
    width:260px;
    background:#0f172a;
    min-height:100vh;
    color:#fff;
}

.sidebar a{
    display:flex;
    align-items:center;
    gap:10px;
    padding:12px 18px;
    color:#cbd5e1;
    text-decoration:none;
}

.sidebar a:hover{
    background:#1e293b;
    color:#fff;
}

.header{
    background:#fff;
    padding:12px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.user-box{
    display:flex;
    align-items:center;
    gap:10px;
}

.user-box img{
    width:42px;
    height:42px;
    border-radius:50%;
    object-fit:cover;
}

.container-box{
    background:#fff;
    border-radius:12px;
    padding:20px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.action-btn{
    background:#e5e7eb;
    color:#111827;
    border:none;
    padding:4px 10px;
    border-radius:6px;
    font-size:13px;
    text-decoration:none;
}

.action-btn:hover{
    background:#d1d5db;
}

.pagination button{
    margin:2px;
}

@media(max-width:768px){
    .sidebar{ width:100px; }
    .sidebar a{
        flex-direction:column;
        font-size:11px;
        text-align:center;
    }
}
</style>
</head>

<body>

<div class="d-flex">

<div class="sidebar">
    <div class="p-3 text-center border-bottom">
        <img src="iconogris.png" width="65">
        <h6>Sistema Préstamos</h6>
        <small>Encargado</small>
    </div>

    <a href="dashboard-encargado.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
    <a href="equipos-encargado.html"><i class="bi bi-hdd-stack"></i> Equipos</a>
    <a href="registrar_prestamoE.html"><i class="bi bi-box-arrow-in-down"></i> Préstamo</a>
    <a href="registrar_devolucionE.html"><i class="bi bi-arrow-return-left"></i> Devolución</a>
    <a href="historial_PrestamosE.html"><i class="bi bi-clock-history"></i> Historial</a>
    <a href="perfilE.html"><i class="bi bi-person-circle"></i> Perfil</a>
</div>

<div class="flex-grow-1">

<div class="header">

    <div>
        <h6 class="mb-0">Facultad de Ingeniería Mochis</h6>
        <small>Universidad Autónoma de Sinaloa</small>
    </div>

    <div class="user-box">
        <span id="nombreUser">Usuario</span>
        <img id="fotoUser" src="usuario.jpg">
        <button class="btn btn-danger btn-sm" onclick="logout()">
            <i class="bi bi-box-arrow-right"></i>
        </button>
    </div>

</div>

<div class="p-4">

<div class="container-box">

<input type="text" class="form-control mb-3" id="busqueda"
placeholder="Buscar por usuario, equipo o número de cuenta...">

<div class="col-md-3">
<select class="form-control" id="estado">
<option value="">Todos</option>
<option value="Pendiente">Pendiente</option>
<option value="Aprobada">Aprobada</option>
<option value="Rechazada">Rechazada</option>
</select>
</div>


<div class="table-responsive">
<table class="table table-hover">
<thead>
<tr>
<th>Usuario</th>
<th>Equipo</th>
<th>Cuenta</th>
<th>Solicitud</th>
<th>Devolución</th>
<th>Estado</th>
<th>Acción</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

<div class="d-flex justify-content-center mt-3" id="paginacion"></div>

</div>

</div>

</div>

</div>

<script>
const API = "http://localhost:5193/api/solicitudes";
let data = [];
let pagina = 1;
const porPagina = 10;

const usuario = JSON.parse(localStorage.getItem("usuario"));

function logout(){
    localStorage.removeItem("usuario");
    window.location.href = "login.html";
}

function cargarUsuario(){
    if(usuario){
        document.getElementById("nombreUser").innerText = usuario.nombre;
        if(usuario.foto){
            document.getElementById("fotoUser").src =
                "data:image/png;base64," + usuario.foto;
        }
    }
}

async function cargar(){

    let estado = document.getElementById("estado")?.value || "";

    let url = API;
    if(estado) url += "?estado=" + estado;

    let res = await fetch(url);
    data = await res.json();

    pagina = 1;
    render();
}

function render(){

    let filtro = document.getElementById("busqueda").value.toLowerCase();

    let filtrado = data.filter(x =>
        (x.usuario || "").toLowerCase().includes(filtro) ||
        (x.equipo || "").toLowerCase().includes(filtro) ||
        (x.numeroCuenta || "").toLowerCase().includes(filtro)
    );

    let inicio = (pagina - 1) * porPagina;
    let fin = inicio + porPagina;

    let paginados = filtrado.slice(inicio, fin);

    let tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    paginados.forEach(s => {

        let color = "bg-secondary text-white";
        if (s.estado === "Aprobada") color = "bg-success";
        if (s.estado === "Rechazada") color = "bg-danger";
        if (s.estado === "Pendiente") color = "bg-warning text-dark";

        let btn = s.estado === "Pendiente" ? "Ver" : "Revisar";

        tbody.innerHTML += `
        <tr>
            <td>${s.usuario}</td>
            <td>${s.equipo}</td>
            <td>${s.numeroCuenta || ""}</td>
            <td>${s.fechaSolicitud}</td>
            <td>${s.fechaFin}</td>
            <td><span class="badge ${color}">${s.estado}</span></td>
            <td>
                <a class="action-btn" href="RevisionPrestamoE.html?id=${s.id}">
                    ${btn}
                </a>
            </td>
        </tr>`;
    });

    paginacion(filtrado.length);
}

function paginacion(total){

    let cont = document.getElementById("paginacion");
    if(!cont) return;

    cont.innerHTML = "";

    let paginas = Math.ceil(total / porPagina);

    for(let i = 1; i <= paginas; i++){
        cont.innerHTML += `
        <button class="btn btn-sm ${i === pagina ? 'btn-primary' : 'btn-outline-primary'}"
        onclick="cambiar(${i})">${i}</button>`;
    }
}

function cambiar(p){
    pagina = p;
    render();
}

document.getElementById("busqueda").addEventListener("input", () => {
    pagina = 1;
    render();
});

document.getElementById("estado")?.addEventListener("change", cargar);

setInterval(cargar, 10000);

cargarUsuario();
cargar();
</script>

</body>
</html>
