
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Usuario - Sistema de Préstamos FIM</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<style>
body {
    background: #f4f6f9;
    min-height: 100vh;
}

.header-top {
    background: #ffffff;
    padding: 10px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    border-bottom-left-radius: 12px;
    border-bottom-right-radius: 12px;
}

.header-top img {
    width: 60px;
}

.dashboard-title {
    display: flex;
    align-items: center;
    gap: 15px;
    margin-bottom: 20px;
}

.dashboard-title img {
    width: 50px;
}

.card-dashboard {
    border-radius: 12px;
    text-align: center;
    padding: 20px;
}

.card-dashboard .card-text {
    font-size: 1.5rem;
    font-weight: bold;
}

.card-dashboard i {
    font-size: 2rem;
    margin-bottom: 10px;
}

.sidebar {
    background: #343a40;
    min-height: 100vh;
    color: #fff;
}

.sidebar a {
    display: flex;
    align-items: center;
    padding: 12px 20px;
    color: #fff;
    text-decoration: none;
    transition: background 0.2s;
}

.sidebar a:hover {
    background: #495057;
    text-decoration: none;
}

.sidebar i {
    margin-right: 10px;
}

.main-content {
    padding: 20px;
}

.alert-custom {
    border-radius: 10px;
}

.user-panel img {
    width: 40px;
    height: 40px;
    object-fit: cover;
    border-radius: 50%;
}
</style>
</head>
<body>

<div class="d-flex">

    <div class="sidebar flex-shrink-0">
        <div class="p-3 text-center border-bottom">
            <img src="iconogris.png" alt="Logo App" class="img-fluid mb-2" style="width:70px;">
            <h6>Sistema de Préstamos</h6>
            <small>Alumno</small>

        </div>
       <a href="dashboard-usuarioNormal.html"><i class="bi bi-house-door"></i> Inicio</a>
        <a href="mis_prestamos.html"><i class="bi bi-box-arrow-in-down"></i> Mis préstamos</a>
        <a href="solicitarPrestamo.html"><i class="bi bi-plus-circle"></i> Solicitar préstamo</a>
        <a href="Historial_prestamos.html"><i class="bi bi-clock-history"></i> Historial de préstamos</a>
        <a href="perfil_configuracion.html"><i class="bi bi-person-circle"></i> Perfil</a>
    </div>



    <div class="flex-grow-1">

        <div class="header-top">
            <div>
                <h6 class="mb-0">Facultad de Ingeniería Mochis</h6>
                <small>Universidad Autónoma de Sinaloa</small>
            </div>

            <div class="d-flex align-items-center gap-3">
                <div class="d-flex align-items-center gap-2 user-panel">
                    
                    <div class="text-end">
                        <div class="fw-bold">Juan Pérez</div>
                        <small>1234567</small>
                    </div>
                    <img src="usuario.jpg" alt="Foto Usuario">
                     <img src="logo_fim.png" alt="Logo FIM">
                </div>
            </div>
        </div>

<div class="main-content">

<div class="section-title">
<h4 class="text-danger">Alertas personales</h4>
</div>

<div class="alert alert-warning">⚠️ Tu préstamo vence pronto</div>

</div>

</div>
