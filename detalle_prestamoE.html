<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detalle de Préstamo</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<style>
body { background: #f4f6f9; }

.header-top {
    background: #fff;
    padding: 12px 25px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.sidebar {
    background: #212529;
    min-height: 100vh;
    color: #fff;
}

.sidebar a {
    display: flex;
    padding: 14px 20px;
    color: #adb5bd;
    text-decoration: none;
    transition: 0.3s;
}

.sidebar a:hover {
    background: #343a40;
    color: #fff;
}

.main-content { padding: 25px; }

.card-box {
    background: white;
    border-radius: 14px;
    padding: 25px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.08);
}

.timeline {
    position: relative;
    padding-left: 30px;
    margin-top: 20px;
}

.timeline::before {
    content: '';
    position: absolute;
    left: 10px;
    top: 0;
    width: 3px;
    height: 100%;
    background: #dee2e6;
}

.timeline-item {
    position: relative;
    margin-bottom: 20px;
    padding-left: 15px;
}

.timeline-item::before {
    content: '';
    position: absolute;
    left: -2px;
    top: 5px;
    width: 12px;
    height: 12px;
    background: #0d6efd;
    border-radius: 50%;
}

.info-label {
    font-size: 13px;
    color: #6c757d;
}

.info-value {
    font-weight: 600;
    font-size: 16px;
}
</style>
</head>

<body onload="cargarDetalle()">

<div class="d-flex">

    <div class="sidebar flex-shrink-0">
        <div class="p-3 text-center border-bottom">
            <img src="iconogris.png" style="width:70px;">
            <h6>Sistema de Préstamos</h6>
            <small>Encargado</small>
        </div>

        <a href="dashboard-encargado.html"><i class="bi bi-hdd-stack"></i> Dashboard</a>
        <a href="equipos-encargado.html"><i class="bi bi-hdd-stack"></i> Equipos disponibles</a>
        <a href="registrar_prestamoE.html"><i class="bi bi-box-arrow-in-down"></i> Registrar préstamo</a>
        <a href="registrar_devolucionE.html"><i class="bi bi-arrow-return-left"></i> Registrar devolución</a>
        <a href="historial_PrestamosE.html"><i class="bi bi-clock-history"></i> Historial</a>
        <a href="perfilE.html"><i class="bi bi-person-circle"></i> Perfil</a>
    </div>

    <div class="flex-grow-1">

        <div class="header-top">
            <div>
                <h6 class="mb-0">Facultad de Ingeniería Mochis</h6>
                <small>Universidad Autónoma de Sinaloa</small>
            </div>

            <div class="d-flex align-items-center gap-3">
                <img src="logo_fim.png" style="width:60px;">
                <div class="d-flex align-items-center gap-2">
                    <img src="usuario.jpg" style="width:40px;border-radius:50%;">
                    <div class="text-end">
                        <div class="fw-bold">Marely</div>
                        <small>00234</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="main-content">

            <div class="card-box">

                <a href="registrar_prestamoE.html" class="btn btn-outline-secondary mb-4">
                    <i class="bi bi-arrow-left"></i> Regresar
                </a>

                <div class="row g-4">

                    <div class="col-md-4">
                        <div class="info-label">Usuario</div>
                        <div id="usuario" class="info-value"></div>
                    </div>

                    <div class="col-md-4">
                        <div class="info-label">Equipo</div>
                        <div id="equipo" class="info-value"></div>
                    </div>

                    <div class="col-md-4">
                        <div class="info-label">Estado</div>
                        <span id="estado" class="badge"></span>
                    </div>

                    <div class="col-md-4">
                        <div class="info-label">Fecha préstamo</div>
                        <div id="fechaPrestamo" class="info-value"></div>
                    </div>

                    <div class="col-md-4">
                        <div class="info-label">Fecha devolución</div>
                        <div id="fechaDevolucion" class="info-value"></div>
                    </div>

                    <div class="col-md-4">
                        <div class="info-label">Motivo</div>
                        <div id="motivo" class="info-value"></div>
                    </div>

                </div>

                <h5 class="mt-5">
                    <i class="bi bi-clock-history"></i> Historial del préstamo
                </h5>

                <div class="timeline" id="historial"></div>

            </div>

        </div>

    </div>
</div>

<script>
function cargarDetalle() {

    let prestamo = {
        usuario: "Juan Pérez",
        equipo: "Laptop HP",
        estado: "Activo",
        fechaPrestamo: "20/03/2026 10:00",
        fechaDevolucion: "22/03/2026 14:00",
        motivo: "Prácticas de programación",
        historial: [
            {accion:"Préstamo registrado", fecha:"20/03/2026 10:00"},
            {accion:"En uso", fecha:"21/03/2026 09:00"},
            {accion:"Devolución parcial", fecha:"21/03/2026 12:00"}
        ]
    };

    usuario.innerText = prestamo.usuario;
    equipo.innerText = prestamo.equipo;
    fechaPrestamo.innerText = prestamo.fechaPrestamo;
    fechaDevolucion.innerText = prestamo.fechaDevolucion;
    motivo.innerText = prestamo.motivo;

    let badge = document.getElementById("estado");
    badge.innerText = prestamo.estado;

    if(prestamo.estado === "Activo") badge.className = "badge bg-success";
    else if(prestamo.estado === "Retrasado") badge.className = "badge bg-danger";
    else badge.className = "badge bg-secondary";

    let html = "";
    prestamo.historial.forEach(h => {
        html += `
        <div class="timeline-item">
            <strong>${h.accion}</strong><br>
            <small class="text-muted">${h.fecha}</small>
        </div>`;
    });

    historial.innerHTML = html;
}
</script>

</body>
</html>
