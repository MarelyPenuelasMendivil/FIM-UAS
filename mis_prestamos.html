<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis Préstamos</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<style>
body{background:#f4f6f9;font-family:'Segoe UI',sans-serif;}

.sidebar{
width:260px;
background:#0f172a;
min-height:100vh;
color:#fff;
transition:.3s;
}

.sidebar a{
display:flex;
align-items:center;
gap:10px;
padding:12px 18px;
color:#cbd5e1;
text-decoration:none;
transition:.2s;
}

.sidebar a:hover,.active-link{
background:#1e293b;
color:#fff;
}

.header{
background:#fff;
padding:12px 20px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.user-box{
display:flex;
align-items:center;
gap:10px;
}

.user-box img{
width:42px;
height:42px;
border-radius:50%;
object-fit:cover;
}

.container-box{
background:#fff;
border-radius:14px;
padding:20px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}
@media (max-width: 768px){
    .sidebar{
        position: fixed;
        left: -260px;
        top: 0;
        z-index: 1000;
        transition: .3s;
    }

    .sidebar.active{
        left: 0;
    }

    .header{
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
    }

    .user-box{
        width: 100%;
        justify-content: space-between;
    }
}
</style>
</head>

<body onload="init()">

<div class="d-flex">

<div class="sidebar">

<div class="p-3 text-center border-bottom">
<img src="iconogris.png" width="65">
<h6>Sistema Préstamos</h6>
<small>Alumno</small>
</div>

<a href="dashboard-usuarioNormal.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
<a href="mis_prestamos.html" class="active-link"><i class="bi bi-box-arrow-in-down"></i> Mis préstamos</a>
<a href="solicitarPrestamo.html"><i class="bi bi-plus-circle"></i> Solicitar</a>
<a href="Historial_prestamos.html"><i class="bi bi-clock-history"></i> Historial</a>
<a href="perfil_configuracion.html"><i class="bi bi-person-circle"></i> Perfil</a>

</div>

<div class="flex-grow-1">

<div class="header">

<div class="d-flex align-items-center gap-2">
<button class="btn btn-dark d-md-none" onclick="toggleMenu()">
<i class="bi bi-list"></i>
</button>

<div>
<h6 class="mb-0">Facultad de Ingeniería Mochis</h6>
<small>Universidad Autónoma de Sinaloa</small>
</div>
</div>

<div class="user-box">
<div class="text-end">
<div class="fw-bold" id="nombreUsuario"></div>
<small id="numeroCuenta"></small>
</div>
<img id="fotoUsuario" src="">
<button class="btn btn-danger btn-sm" onclick="logout()">
<i class="bi bi-box-arrow-right"></i>
</button>
</div>

</div>

<div class="p-4">

<h5 class="mb-3 text-primary">
<i class="bi bi-box-arrow-in-down"></i> Mis Préstamos
</h5>

<div class="container-box">

<table class="table table-hover align-middle">
<thead class="table-light">
<tr>
<th>Equipo</th>
<th>Fecha préstamo</th>
<th>Fecha devolución</th>
<th>Estado</th>
</tr>
</thead>

<tbody id="tablaPrestamos"></tbody>

</table>

</div>

</div>

</div>

</div>

<script>

const API="http://localhost:5193/api";
let usuario=JSON.parse(localStorage.getItem("usuario"));

function init(){
if(!usuario){
window.location.href="login.html";
return;
}
cargarPerfil();
cargarPrestamos();
}

function toggleMenu(){
document.querySelector(".sidebar").classList.toggle("active");
}

function logout(){
localStorage.clear();
window.location.href="login.html";
}

async function cargarPerfil(){
let res=await fetch(`${API}/usuarios/${usuario.id}`);
let data=await res.json();

document.getElementById("nombreUsuario").innerText=data.nombre;
document.getElementById("numeroCuenta").innerText=data.usuario || "";

if(data.foto){
document.getElementById("fotoUsuario").src="data:image/png;base64,"+data.foto;
}
}

async function cargarPrestamos(){

let res=await fetch(`${API}/prestamos`);
let data=await res.json();

let tbody=document.getElementById("tablaPrestamos");
tbody.innerHTML="";

let lista=data.filter(p=>p.usuarioId==usuario.id);

lista.forEach(p=>{

let estado="secondary";
let texto=p.estado;

if(p.estado==="Activo"){
estado="warning";
texto="En uso";
}
if(p.estado==="Devuelto"){
estado="success";
}

tbody.innerHTML+=`
<tr>
<td>${p.equipo}</td>
<td>${new Date(p.fechaPrestamo).toLocaleString()}</td>
<td>${p.fechaDevolucion?new Date(p.fechaDevolucion).toLocaleString():"Pendiente"}</td>
<td><span class="badge bg-${estado}">${texto}</span></td>
</tr>
`;
});

}

</script>

</body>
</html>
