<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfil Encargado</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<style>
body { background:#f4f6f9; font-family:'Segoe UI', sans-serif; }

.sidebar{
    width:260px;
    background:#0f172a;
    min-height:100vh;
    color:#fff;
}

.sidebar a{
    display:flex;
    align-items:center;
    gap:10px;
    padding:12px 18px;
    color:#cbd5e1;
    text-decoration:none;
    transition:.2s;
}

.sidebar a:hover{
    background:#1e293b;
    color:#fff;
}

.header{
    background:#fff;
    padding:12px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.container-box{
    background:#fff;
    border-radius:14px;
    padding:20px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.profile-img{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
}

.user-box{
    display:flex;
    align-items:center;
    gap:10px;
}

.user-box img{
    width:42px;
    height:42px;
    border-radius:50%;
    object-fit:cover;
}
</style>
</head>

<body onload="init()">

<div class="d-flex">

<div class="sidebar">
    <div class="p-3 text-center border-bottom">
        <img src="iconogris.png" width="65">
        <h6>Sistema Préstamos</h6>
        <small>Encargado</small>
    </div>

    <a href="dashboard-encargado.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
    <a href="equipos-encargado.html"><i class="bi bi-hdd-stack"></i> Equipos</a>
    <a href="registrar_prestamoE.html"><i class="bi bi-box-arrow-in-down"></i> Préstamo</a>
    <a href="registrar_devolucionE.html"><i class="bi bi-arrow-return-left"></i> Devolución</a>
    <a href="historial_PrestamosE.html"><i class="bi bi-clock-history"></i> Historial</a>
    <a href="perfilE.html"><i class="bi bi-person-circle"></i> Perfil</a>
</div>

<div class="flex-grow-1">

<div class="header">

    <div>
        <h6 class="mb-0">Facultad de Ingeniería Mochis</h6>
        <small>Universidad Autónoma de Sinaloa</small>
    </div>

    <div class="user-box">
        <span id="nombreHeader"></span>
        <img id="fotoHeader" src="usuario.jpg">
        <button class="btn btn-danger btn-sm" onclick="logout()">
            <i class="bi bi-box-arrow-right"></i>
        </button>
    </div>

</div>

<div class="p-4">

<div class="row g-4">

<div class="col-md-4">
<div class="container-box text-center">

<img id="fotoPreview" src="usuario.jpg" class="profile-img mb-3">

<input type="file" id="inputFoto" class="form-control mb-2">

<button class="btn btn-outline-primary w-100" onclick="subirFoto()">
<i class="bi bi-upload"></i> Subir foto
</button>

<hr>

<p><strong>No. Cuenta:</strong><br><span id="cuentaUser"></span></p>

</div>
</div>

<div class="col-md-8">
<div class="container-box">

<h5 class="mb-3">Editar perfil</h5>

<form onsubmit="guardarPerfil(event)">

<input type="text" id="nombre" class="form-control mb-3" placeholder="Nombre">

<input type="email" id="correoInput" class="form-control mb-3" placeholder="Correo">

<input type="password" id="pass1" class="form-control mb-2" placeholder="Nueva contraseña">

<input type="password" id="pass2" class="form-control mb-3" placeholder="Confirmar contraseña">

<button class="btn btn-primary w-100">Guardar cambios</button>

</form>

</div>
</div>

</div>

</div>

</div>
</div>

<script>

const API="http://localhost:5193/api/usuarios";
let usuario = JSON.parse(localStorage.getItem("usuario"));

function init(){
    if(!usuario){
        alert("No hay sesión");
        location.href="login.html";
        return;
    }

    cargarPerfil();
}

async function cargarPerfil(){
    try{
        let res = await fetch(`${API}/${usuario.id}`);
        let data = await res.json();

        document.getElementById("nombre").value = data.nombre || "";
        document.getElementById("correoInput").value = data.correo || "";
        document.getElementById("cuentaUser").innerText = data.usuario || "";

        if(data.foto){
            let img = "data:image/png;base64,"+data.foto;
            document.getElementById("fotoPreview").src = img;
            document.getElementById("fotoHeader").src = img;
        }

        document.getElementById("nombreHeader").innerText = data.nombre;

        // 🔥 actualizar sesión
        localStorage.setItem("usuario", JSON.stringify({
            id:data.id,
            nombre:data.nombre,
            numeroCuenta:data.usuario,
            foto:data.foto
        }));

        usuario = JSON.parse(localStorage.getItem("usuario"));

    }catch{
        alert("Error cargando perfil");
    }
}

function logout(){
    localStorage.clear();
    location.href="login.html";
}

document.getElementById("inputFoto").addEventListener("change",function(){
    let file=this.files[0];
    let reader=new FileReader();

    reader.onload=e=>{
        document.getElementById("fotoPreview").src=e.target.result;
    };

    if(file) reader.readAsDataURL(file);
});

async function subirFoto(){

    let file=document.getElementById("inputFoto").files[0];

    if(!file){
        alert("Selecciona imagen");
        return;
    }

    let formData=new FormData();
    formData.append("foto",file);

    let res = await fetch(`${API}/${usuario.id}/foto`,{
        method:"POST",
        body:formData
    });

    if(res.ok){
        alert("Foto actualizada");
        await cargarPerfil();
    }else{
        alert("Error al subir foto");
    }
}

async function guardarPerfil(e){
    e.preventDefault();

    let pass1=document.getElementById("pass1").value;
    let pass2=document.getElementById("pass2").value;

    if(pass1!==pass2){
        alert("Contraseñas no coinciden");
        return;
    }

    let body={
        nombre:document.getElementById("nombre").value,
        correo:document.getElementById("correoInput").value,
        usuario: usuario.numeroCuenta, // 🔥 CLAVE
        rol:2,
        estado:"Activo"
    };

    if(pass1.trim()!==""){
        body.password=pass1;
    }

    let res = await fetch(`${API}/${usuario.id}`,{
        method:"PUT",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify(body)
    });

    if(res.ok){
        alert("Perfil actualizado");
        await cargarPerfil();
    }else{
        alert("Error al actualizar");
    }
}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
